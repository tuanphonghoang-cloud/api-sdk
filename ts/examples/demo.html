<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Imbrace SDK Demo - 3 Envs</title>
  <script type="module">
    import { createImbraceClient } from '../src/index.js';
    
    async function demo(env) {
      console.log(`🚀 Demo env='${env}'`);
      const client = createImbraceClient({ 
        env, 
        organizationId: 'demo-org-id',
        checkHealth: true 
      });
      
      console.log('Gateway:', client.health.base);
      console.log('Channel:', client.channel.base);
      console.log('Boards:', client.boards.base);
      console.log('✅ Health OK!');
      
      await client.init();
      console.log('✅ SDK ready!');
    }
    
    // Run all 3 envs
    demo('develop');
    demo('sandbox'); 
    demo('stable');
  </script>
</head>
<body>
  <h1>Check Console - Imbrace SDK 3 Envs Demo ✅</h1>
  <p>Open F12 → Console để xem ServiceRegistry URLs!</p>
</body>
</html>
